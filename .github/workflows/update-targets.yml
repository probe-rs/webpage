name: Update targets & deploy
run-name: "Update probe-rs targets"

# Pulls the latest target YAML from probe-rs/probe-rs, and rebuilds and
# deploys the site whenever the data changed. Runs on its own, so it does not
# depend on any cross-repo token that could expire.
on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Don't fight the push-triggered deploy over the Pages deployment.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.update.outputs.changed }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 23

      - name: Update probe-rs target data
        id: update
        run: |
          npm update probe-rs-targets
          if git diff --quiet package-lock.json; then
            echo "No target changes."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -am "Update probe-rs target data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: update
    if: needs.update.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: master # pick up the commit the update job just pushed

      - name: Build with Astro
        uses: withastro/action@v6

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
